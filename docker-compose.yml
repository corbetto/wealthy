services:
  wealthy:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - wealthy-data:/data
    environment:
      - GIN_MODE=release
      - DATA_PATH=/data/wealthy.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  wealthy-data:
